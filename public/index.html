<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      padding: 15px 20px;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      outline: none;
    }
    button.add-btn {
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      background: #ff6b6b;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button.add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    }
    ul {
      list-style: none;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    li {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #eee;
      transition: background 0.2s;
    }
    li:last-child {
      border-bottom: none;
    }
    li:hover {
      background: #fafafa;
    }
    li.completed span {
      text-decoration: line-through;
      color: #999;
    }
    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #667eea;
      border-radius: 50%;
      cursor: pointer;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .checkbox:hover {
      background: #667eea;
    }
    li.completed .checkbox {
      background: #667eea;
    }
    li.completed .checkbox::after {
      content: '✓';
      color: white;
      font-size: 14px;
    }
    span {
      flex: 1;
      font-size: 1.1rem;
      color: #333;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #ff6b6b;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 5px 10px;
      transition: transform 0.2s;
    }
    .delete-btn:hover {
      transform: scale(1.2);
    }
    .stats {
      text-align: center;
      color: white;
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="Add a new task...">
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <ul id="todoList"></ul>
    <div class="stats" id="stats"></div>
  </div>

  <script>
    async function loadTodos() {
      const res = await fetch('/api/todos');
      return await res.json();
    }

    async function render() {
      todos = await loadTodos();
      const list = document.getElementById('todoList');
      list.innerHTML = todos.map((todo, i) => `
        <li class="${todo.completed ? 'completed' : ''}">
          <div class="checkbox" onclick="toggleTodo(${i})"></div>
          <span>${todo.text}</span>
          <button class="delete-btn" onclick="deleteTodo(${i})">×</button>
        </li>
      `).join('');
      updateStats();
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (text) {
        await fetch('/api/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, completed: false })
        });
        input.value = '';
        render();
      }
    }

    async function toggleTodo(index) {
      const todo = todos[index];
      await fetch(`/api/todos/${index}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed: !todo.completed })
      });
      render();
    }

    async function deleteTodo(index) {
      await fetch(`/api/todos/${index}`, { method: 'DELETE' });
      render();
    }

    function updateStats() {
      const completed = todos.filter(t => t.completed).length;
      document.getElementById('stats').textContent = `${completed} of ${todos.length} tasks completed`;
    }

    document.getElementById('todoInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
